# Production compose: builds/runs the API and a Postgres database
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: produser
      POSTGRES_PASSWORD: prodpass
      POSTGRES_DB: stockaholic
    volumes:
      - ./db_prod_data:/var/lib/postgresql/data
      - ./scripts/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stockaholic_net
  cache:
    image: redis:7.4-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning --requirepass prodpass
    volumes:
      - cache:/data
    networks:
      - stockaholic_net

  api:
    build:
      context: ./Stockaholic.Api
      dockerfile: Dockerfile
    image: stockaholic-api:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8000:8000"
      - "4343:4343"
    networks:
      - stockaholic_net

volumes:
  db_prod_data:
  cache:
    driver: local
networks:
  stockaholic_net:
    driver: bridge
