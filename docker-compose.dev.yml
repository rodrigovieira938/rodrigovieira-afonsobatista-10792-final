version: "3.8"

# Development compose: only a Postgres instance so you can run the API locally
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: stockaholic
    volumes:
      - db_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_dev_data:
